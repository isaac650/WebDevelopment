<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AirBNB Listings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>

    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">AirBNB Listings</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
          </ul>
          <input id="search-input" class="form-control me-2" type="search" placeholder="Search listings..." />
          <select id="type-filter" class="form-select w-auto">
            <option value="">All types</option>
            <option value="entire home">Entire home</option>
            <option value="private room">Private room</option>
            <option value="shared room">Shared room</option>
            <option value="hotel room">Hotel room</option>
          </select>
        </div>
      </div>
    </nav>

    <div class="container mt-4">
      <h1>AirBNB Listings</h1>
      <p class="text-muted"> San Francisco listings.</p>
      <hr />

      <h2>Listings <span id="listing-count" class="fs-6 text-muted fw-normal"></span></h2>

      <div id="listings" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mt-1">
        <div id="skeleton-loader" class="col-12 text-center py-5">
          <div class="spinner-border text-secondary" role="status"></div>
          <p class="mt-2 text-muted">Loading listings...</p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
  </body>
</html>
